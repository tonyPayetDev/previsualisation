<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prévisualisation — foodboost-11-grillades</title>
<style>
  :root{ --bg:#0a0a0f; --panel:#111117; --border:#242430; --neon-yellow:#f5d90a; --neon-purple:#a855f7; --neon-orange:#ff7a1a; --text:#f2f2f5; --muted:#9a9aa8; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:2rem 1rem 4rem}
  .wrap{max-width:480px;margin:0 auto}
  a.back{color:var(--muted);font-size:.8rem;text-decoration:none;display:inline-block;margin-bottom:1rem}
  header{text-align:center;margin-bottom:2rem}
  header h1{font-size:1.4rem;margin:0 0 .3rem;background:linear-gradient(90deg,var(--neon-yellow),var(--neon-orange));-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{color:var(--muted);font-size:.85rem;margin:0}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 0 0 1px rgba(245,217,10,.06),0 20px 60px -20px rgba(168,85,247,.35);margin-bottom:1.5rem}
  .card-head{padding:1rem 1.2rem .8rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
  .badge{font-size:.7rem;font-weight:600;padding:.25rem .6rem;border-radius:999px;background:rgba(245,217,10,.12);color:var(--neon-yellow);border:1px solid rgba(245,217,10,.3);white-space:nowrap}
  .card-head h2{font-size:1rem;margin:0;font-weight:600}
  video{display:block;width:100%;aspect-ratio:9/16;background:#000}
  .meta{padding:1rem 1.2rem 1.3rem;border-top:1px solid var(--border);font-size:.8rem;color:#c9c9d4;line-height:1.7}
  .meta b{color:var(--neon-yellow)}
  footer{text-align:center;margin-top:2rem;font-size:.75rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← Toutes les vidéos</a>
  <header>
    <h1>foodboost-11-grillades</h1>
    <p>Publié automatiquement à la fin du rendu</p>
  </header>
  <div class="card">
    <div class="card-head">
      <h2>Rendu final</h2>
      <span class="badge">⏳ À valider</span>
    </div>
    <video src="video.mp4" controls playsinline loop></video>
    <div class="meta">
      Durée <b>—</b> · Poids <b>14 Mo</b> · Rendu le <b>22/07/2026</b>
    </div>
  </div>
  <footer>previsualisation.automatisationboost.com</footer>
</div>
</body>
</html>
